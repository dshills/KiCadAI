name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  offline-quality:
    name: Offline quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KICADAI_EXAMPLE_TEST_TIMEOUT: 3m
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        run: |
          git ls-files -z '*.go' | xargs -0 --no-run-if-empty gofmt -d > /tmp/gofmt.diff
          if [ -s /tmp/gofmt.diff ]; then
            cat /tmp/gofmt.diff
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m ./...

      - name: Run complete test suite
        run: make test

      # Coverage uses Go's short-test tier because the complete suite above
      # already exercises the multi-minute end-to-end promotion corpora.
      - name: Enforce coverage floor
        run: make COVER_TEST_FLAGS=-short coverage-check
