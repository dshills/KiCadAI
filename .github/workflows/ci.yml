name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  offline-quality:
    name: Offline quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KICADAI_EXAMPLE_TEST_TIMEOUT: 3m
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        run: |
          git ls-files -z '*.go' | xargs -0 --no-run-if-empty gofmt -d > /tmp/gofmt.diff
          if [ -s /tmp/gofmt.diff ]; then
            cat /tmp/gofmt.diff
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2
          args: --timeout=5m ./...

      - name: Verify clean-checkout promotion contract
        run: go test ./internal/promotionrunner -run '^(TestCleanCheckoutPromotionCommandContract|TestPromotionWorkflowContractAndPinnedActions)$'

      # Frozen end-to-end promotion corpora run in independent jobs below.
      - name: Run bounded test suite
        run: make GO_TEST_FLAGS=-short test

      # Coverage uses the same bounded tier; promotion jobs exercise the long
      # end-to-end gates without instrumenting them a second time.
      - name: Enforce coverage floor
        run: make COVER_TEST_FLAGS=-short coverage-check

  offline-promotion:
    name: Offline promotion corpus (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KICADAI_EXAMPLE_TEST_TIMEOUT: 3m
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: open-set
            test: TestFrozenOpenSetCorpusPassesOfflineWorkflow
          - name: adversarial-multi-function
            test: TestFrozenAdversarialMultiFunctionCorpusPassesOfflineWorkflow
          - name: simulation-grounded
            test: TestFrozenSimulationGroundedCorpusPassesOfflineWorkflow
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run frozen promotion corpus
        run: make GO_TEST_TIMEOUT=40m GO_TEST_PACKAGE=./internal/compositionlowering GO_TEST_NAME='${{ matrix.test }}' test-one

  external-review-matrix:
    name: External review regression ladder
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      KICADAI_EXAMPLE_TEST_TIMEOUT: 3m
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run external review matrix twice
        run: make review-matrix
